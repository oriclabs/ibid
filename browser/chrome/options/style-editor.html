<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ibid — Custom Style Editor</title>
  <link rel="stylesheet" href="../styles/ibid.css">
</head>
<body class="min-h-screen bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 font-sans">

  <div class="max-w-3xl mx-auto py-8 px-6">
    <div class="flex items-center gap-3 mb-6">
      <img src="../icons/icon-128.png" alt="Ibid" class="w-8 h-8 rounded-lg">
      <h1 class="text-lg font-bold text-saffron-700 dark:text-saffron-400">Custom Style Editor</h1>
    </div>

    <div class="grid grid-cols-2 gap-6">
      <!-- Editor panel -->
      <div class="space-y-4">
        <div class="bg-white dark:bg-zinc-900 rounded-lg border border-zinc-200 dark:border-zinc-700 p-4 space-y-3">
          <h2 class="text-sm font-semibold">Style Name</h2>
          <input id="cs-name" type="text" placeholder="My Custom Style" class="w-full px-2 py-1.5 rounded border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-sm focus:ring-2 focus:ring-saffron-500 outline-none">
        </div>

        <div class="bg-white dark:bg-zinc-900 rounded-lg border border-zinc-200 dark:border-zinc-700 p-4 space-y-3">
          <h2 class="text-sm font-semibold">Bibliography Template</h2>
          <p class="text-[10px] text-zinc-400">Use placeholders: {author}, {year}, {title}, {container}, {volume}, {issue}, {page}, {doi}, {url}, {publisher}</p>

          <div class="space-y-2">
            <div>
              <label class="text-[10px] text-zinc-500">Journal Article</label>
              <input id="cs-journal" type="text" value="{author}. ({year}). {title}. *{container}*, *{volume}*({issue}), {page}. {doi}" class="w-full px-2 py-1 rounded border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-xs font-mono focus:ring-1 focus:ring-saffron-500 outline-none">
            </div>
            <div>
              <label class="text-[10px] text-zinc-500">Book</label>
              <input id="cs-book" type="text" value="{author}. ({year}). *{title}*. {publisher}." class="w-full px-2 py-1 rounded border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-xs font-mono focus:ring-1 focus:ring-saffron-500 outline-none">
            </div>
            <div>
              <label class="text-[10px] text-zinc-500">Webpage</label>
              <input id="cs-webpage" type="text" value="{author}. ({year}). {title}. {url}" class="w-full px-2 py-1 rounded border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-xs font-mono focus:ring-1 focus:ring-saffron-500 outline-none">
            </div>
            <div>
              <label class="text-[10px] text-zinc-500">Other / Default</label>
              <input id="cs-default" type="text" value="{author}. ({year}). {title}. {doi}" class="w-full px-2 py-1 rounded border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-xs font-mono focus:ring-1 focus:ring-saffron-500 outline-none">
            </div>
          </div>
        </div>

        <div class="bg-white dark:bg-zinc-900 rounded-lg border border-zinc-200 dark:border-zinc-700 p-4 space-y-3">
          <h2 class="text-sm font-semibold">In-text Citation</h2>
          <div class="space-y-2">
            <div>
              <label class="text-[10px] text-zinc-500">Parenthetical</label>
              <input id="cs-intext" type="text" value="({author-short}, {year})" class="w-full px-2 py-1 rounded border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-xs font-mono focus:ring-1 focus:ring-saffron-500 outline-none">
            </div>
          </div>
        </div>

        <div class="bg-white dark:bg-zinc-900 rounded-lg border border-zinc-200 dark:border-zinc-700 p-4 space-y-3">
          <h2 class="text-sm font-semibold">Author Format</h2>
          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="text-[10px] text-zinc-500">Name order</label>
              <select id="cs-name-order" class="w-full px-2 py-1 rounded border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-xs">
                <option value="last-first">Last, First (Smith, J.)</option>
                <option value="first-last">First Last (J. Smith)</option>
              </select>
            </div>
            <div>
              <label class="text-[10px] text-zinc-500">Et al. after</label>
              <select id="cs-etal" class="w-full px-2 py-1 rounded border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-xs">
                <option value="3">3 authors</option>
                <option value="4">4 authors</option>
                <option value="6">6 authors</option>
                <option value="7">7 authors</option>
                <option value="99">Never</option>
              </select>
            </div>
            <div>
              <label class="text-[10px] text-zinc-500">Connector</label>
              <select id="cs-connector" class="w-full px-2 py-1 rounded border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-xs">
                <option value="&">&</option>
                <option value="and">and</option>
              </select>
            </div>
            <div>
              <label class="text-[10px] text-zinc-500">Initials</label>
              <select id="cs-initials" class="w-full px-2 py-1 rounded border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-xs">
                <option value="true">Use initials (J. A.)</option>
                <option value="false">Full name (John Andrew)</option>
              </select>
            </div>
          </div>
        </div>

        <div class="flex gap-2">
          <button id="btn-save-style" class="flex-1 px-3 py-2 rounded-lg bg-saffron-500 hover:bg-saffron-600 text-white font-medium text-sm transition-colors">Save Style</button>
          <button id="btn-export-style" class="px-3 py-2 rounded-lg border border-zinc-200 dark:border-zinc-700 text-sm hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">Export JSON</button>
        </div>
      </div>

      <!-- Preview panel -->
      <div class="space-y-4">
        <div class="bg-white dark:bg-zinc-900 rounded-lg border border-zinc-200 dark:border-zinc-700 p-4 sticky top-4">
          <h2 class="text-sm font-semibold mb-3">Live Preview</h2>

          <div class="space-y-3">
            <div>
              <h3 class="text-[10px] text-zinc-400 uppercase tracking-wider mb-1">Journal Article</h3>
              <div id="preview-journal" class="text-sm leading-relaxed text-zinc-700 dark:text-zinc-300 bg-zinc-50 dark:bg-zinc-800 rounded px-3 py-2"></div>
            </div>
            <div>
              <h3 class="text-[10px] text-zinc-400 uppercase tracking-wider mb-1">Book</h3>
              <div id="preview-book" class="text-sm leading-relaxed text-zinc-700 dark:text-zinc-300 bg-zinc-50 dark:bg-zinc-800 rounded px-3 py-2"></div>
            </div>
            <div>
              <h3 class="text-[10px] text-zinc-400 uppercase tracking-wider mb-1">Webpage</h3>
              <div id="preview-webpage" class="text-sm leading-relaxed text-zinc-700 dark:text-zinc-300 bg-zinc-50 dark:bg-zinc-800 rounded px-3 py-2"></div>
            </div>
            <div>
              <h3 class="text-[10px] text-zinc-400 uppercase tracking-wider mb-1">In-text Citation</h3>
              <div id="preview-intext" class="text-sm text-zinc-700 dark:text-zinc-300 bg-zinc-50 dark:bg-zinc-800 rounded px-3 py-2"></div>
            </div>
          </div>

          <div id="style-save-status" class="hidden mt-3 text-xs rounded px-3 py-2"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="style-editor.js"></script>
</body>
</html>
