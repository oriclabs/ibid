<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ibid</title>
  <link rel="stylesheet" href="../styles/ibid.css">
</head>
<body class="w-[400px] h-[560px] bg-white dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 font-sans text-sm flex flex-col overflow-hidden">

  <!-- Header -->
  <header class="flex items-center justify-between px-4 py-3 border-b border-zinc-200 dark:border-zinc-700 bg-saffron-50 dark:bg-zinc-800">
    <div class="flex items-center gap-2">
      <img src="../icons/icon-32.png" alt="Ibid" class="w-6 h-6 rounded">
      <h1 class="text-base font-semibold text-saffron-700 dark:text-saffron-400">Ibid</h1>
    </div>
    <div class="flex items-center gap-1.5">
      <button id="btn-sidepanel" class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-md bg-saffron-500 hover:bg-saffron-600 text-white text-xs font-medium transition-colors" title="Open library panel">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
        Library
      </button>
      <button id="btn-help-header" class="p-1.5 rounded hover:bg-saffron-100 dark:hover:bg-zinc-700 text-zinc-400 dark:text-zinc-500 hover:text-saffron-600 dark:hover:text-saffron-400 transition-colors" title="Help">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3M12 17h.01"/></svg>
      </button>
      <div class="relative">
        <button id="btn-settings" class="p-1.5 rounded hover:bg-saffron-100 dark:hover:bg-zinc-700 text-zinc-500 dark:text-zinc-400 transition-colors" title="Settings">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
        <!-- Quick Settings Dropdown -->
        <div id="quick-settings" class="hidden absolute right-0 top-full mt-1 w-64 bg-white dark:bg-zinc-800 rounded-lg shadow-lg border border-zinc-200 dark:border-zinc-700 z-50 overflow-hidden">
          <div class="px-3 py-2 border-b border-zinc-100 dark:border-zinc-700">
            <span class="text-[10px] font-semibold text-zinc-400 uppercase tracking-wider">Quick Settings</span>
          </div>
          <div class="p-3 space-y-3">
            <div>
              <label class="block text-[10px] font-medium text-zinc-500 dark:text-zinc-400 mb-1">Default Style</label>
              <select id="qs-style" class="w-full px-2 py-1 rounded border border-zinc-200 dark:border-zinc-600 bg-zinc-50 dark:bg-zinc-700 text-xs focus:ring-1 focus:ring-saffron-500 outline-none cursor-pointer">
                <option value="apa7">APA 7th Edition</option>
                <option value="apa6">APA 6th Edition</option>
                <option value="mla9">MLA 9th Edition</option>
                <option value="mla8">MLA 8th Edition</option>
                <option value="chicago17-author-date">Chicago 17th (Author-Date)</option>
                <option value="chicago16-author-date">Chicago 16th (Author-Date)</option>
                <option value="harvard">Harvard</option>
                <option value="ieee">IEEE</option>
                <option value="vancouver">Vancouver</option>
              </select>
            </div>
            <div>
              <label class="block text-[10px] font-medium text-zinc-500 dark:text-zinc-400 mb-1">Locale</label>
              <select id="qs-locale" class="w-full px-2 py-1 rounded border border-zinc-200 dark:border-zinc-600 bg-zinc-50 dark:bg-zinc-700 text-xs focus:ring-1 focus:ring-saffron-500 outline-none cursor-pointer">
                <option value="en-US">English (US)</option>
                <option value="en-GB">English (UK)</option>
                <option value="es-ES">Spanish</option>
                <option value="fr-FR">French</option>
                <option value="de-DE">German</option>
                <option value="pt-BR">Portuguese (BR)</option>
                <option value="zh-CN">Chinese (Simplified)</option>
                <option value="ja-JP">Japanese</option>
              </select>
            </div>
            <div>
              <label class="block text-[10px] font-medium text-zinc-500 dark:text-zinc-400 mb-1">Theme</label>
              <div class="flex rounded-md overflow-hidden border border-zinc-200 dark:border-zinc-600">
                <button data-theme="light" class="qs-theme flex-1 text-[10px] py-1 bg-zinc-100 dark:bg-zinc-700 text-zinc-600 dark:text-zinc-300 hover:bg-zinc-200 dark:hover:bg-zinc-600 transition-colors">Light</button>
                <button data-theme="system" class="qs-theme flex-1 text-[10px] py-1 bg-saffron-500 text-white">System</button>
                <button data-theme="dark" class="qs-theme flex-1 text-[10px] py-1 bg-zinc-100 dark:bg-zinc-700 text-zinc-600 dark:text-zinc-300 hover:bg-zinc-200 dark:hover:bg-zinc-600 transition-colors">Dark</button>
              </div>
            </div>
          </div>
          <div class="px-3 py-2 border-t border-zinc-100 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-900/50 space-y-1">
            <button id="btn-help" class="w-full text-left text-xs text-zinc-600 dark:text-zinc-400 hover:text-saffron-600 dark:hover:text-saffron-300 font-medium flex items-center justify-between transition-colors">
              <span class="flex items-center gap-1.5">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3M12 17h.01"/></svg>
                Help &amp; Documentation
              </span>
              <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
            </button>
            <button id="btn-advanced-settings" class="w-full text-left text-xs text-saffron-600 dark:text-saffron-400 hover:text-saffron-800 dark:hover:text-saffron-300 font-medium flex items-center justify-between transition-colors">
              Advanced Settings
              <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Loading state -->
  <div id="state-loading" class="flex flex-col items-center justify-center py-12 gap-3">
    <div class="w-8 h-8 border-2 border-saffron-300 border-t-saffron-600 rounded-full animate-spin"></div>
    <p class="text-zinc-500 dark:text-zinc-400">Extracting metadata...</p>
  </div>

  <!-- Main content (hidden until loaded) -->
  <div id="state-ready" class="hidden flex-1 flex flex-col overflow-hidden">

    <!-- Scrollable middle: hint + source type + style + fields -->
    <div class="flex-1 overflow-y-auto">

    <!-- Context hint bar -->
    <div id="hint-bar" class="hidden px-4 py-2 text-xs flex items-start gap-2 border-b">
      <svg id="hint-icon" class="w-4 h-4 shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
      <span id="hint-text"></span>
      <button id="hint-dismiss" class="shrink-0 p-0.5 rounded hover:bg-zinc-200 dark:hover:bg-zinc-700 text-zinc-400" title="Dismiss">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Source type + Style (top bar) -->
    <div class="px-4 pt-3 pb-1 space-y-2">
      <!-- Row 1: Source type + confidence -->
      <div class="flex items-center gap-2">
        <select id="source-type" class="text-xs font-medium px-2 py-0.5 rounded-full bg-saffron-100 dark:bg-saffron-900/30 text-saffron-700 dark:text-saffron-400 border-none cursor-pointer focus:ring-2 focus:ring-saffron-500">
          <option value="webpage">Webpage</option>
          <option value="article-journal">Journal Article</option>
          <option value="article-newspaper">News Article</option>
          <option value="article-magazine">Magazine Article</option>
          <option value="book">Book</option>
          <option value="chapter">Book Chapter</option>
          <option value="paper-conference">Conference Paper</option>
          <option value="thesis">Thesis</option>
          <option value="report">Report</option>
          <option value="post-weblog">Blog Post</option>
          <option value="legislation">Legislation</option>
          <option value="legal-case">Legal Case</option>
          <option value="patent">Patent</option>
          <option value="dataset">Dataset</option>
          <option value="software">Software</option>
          <option value="motion-picture">Film/Video</option>
          <option value="broadcast">Broadcast</option>
        </select>
        <span id="confidence" class="text-[10px] text-zinc-400"></span>
        <div class="flex-1"></div>
        <button id="btn-rescan" class="px-2 py-0.5 rounded border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-800 text-[10px] font-medium text-zinc-500 dark:text-zinc-400 hover:border-saffron-400 hover:text-saffron-600 dark:hover:text-saffron-400 transition-colors flex items-center gap-1" title="Re-extract metadata from current page">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          Rescan Page
        </button>
      </div>
      <!-- Type warning -->
      <div id="type-warning" class="hidden px-2.5 py-1.5 rounded text-[11px] bg-amber-50 dark:bg-amber-900/15 text-amber-700 dark:text-amber-400 border border-amber-200 dark:border-amber-800 flex items-start gap-1.5">
        <svg class="w-3.5 h-3.5 shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126z"/><path d="M12 15.75h.007v.008H12v-.008z"/></svg>
        <span id="type-warning-text"></span>
      </div>
      <!-- Row 2: Style picker -->
      <div>
        <div class="flex items-center justify-between mb-1">
          <label class="text-[10px] font-medium text-zinc-400 uppercase tracking-wider">Citation Style</label>
          <div class="flex items-center gap-1.5">
            <span id="style-source" class="text-[10px] font-medium px-1.5 py-0.5 rounded bg-zinc-100 dark:bg-zinc-800 text-zinc-500 dark:text-zinc-400 hidden"></span>
            <button id="style-info-btn" class="text-zinc-400 hover:text-saffron-500 transition-colors" title="Style info">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
            </button>
          </div>
        </div>
        <select id="style-selector" class="hidden"></select>
        <div class="relative">
          <button id="style-picker-btn" class="w-full px-2.5 py-1.5 rounded border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-sm text-left flex items-center justify-between hover:border-saffron-400 transition-colors">
            <span id="style-picker-label" class="truncate">APA 7th Edition</span>
            <svg class="w-3.5 h-3.5 shrink-0 text-zinc-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
          </button>
          <div id="style-picker-dropdown" class="hidden absolute left-0 right-0 top-full mt-1 bg-white dark:bg-zinc-800 rounded-lg border border-zinc-200 dark:border-zinc-700 shadow-lg z-50 overflow-hidden">
            <div class="p-2 border-b border-zinc-100 dark:border-zinc-700">
              <input id="style-search-input" type="text" placeholder="Search styles (APA, MLA, Nature, IEEE...)" class="w-full px-2 py-1.5 rounded border border-zinc-200 dark:border-zinc-600 bg-zinc-50 dark:bg-zinc-700 text-xs focus:ring-1 focus:ring-saffron-500 outline-none">
            </div>
            <div id="style-picker-list" class="max-h-[250px] overflow-y-auto"></div>
          </div>
        </div>
        <!-- Style info tooltip (hidden) -->
        <div id="style-info-tip" class="hidden mt-1 px-2.5 py-1.5 rounded text-[10px] bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-400 border border-zinc-200 dark:border-zinc-700"></div>
      </div>
    </div>

    <!-- Editable metadata fields — labels get required dots based on source type -->
    <div class="px-4 py-2 space-y-2">
      <div data-field="title">
        <label class="field-label block text-[10px] font-medium text-zinc-400 uppercase tracking-wider mb-0.5">Title <span class="req-dot hidden text-saffron-500">*</span></label>
        <input id="field-title" type="text" class="w-full px-2 py-1.5 rounded border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-sm focus:ring-2 focus:ring-saffron-500 focus:border-saffron-500 outline-none transition-colors">
      </div>
      <div data-field="author">
        <label class="field-label block text-[10px] font-medium text-zinc-400 uppercase tracking-wider mb-0.5">Authors <span class="req-dot hidden text-saffron-500">*</span></label>
        <input id="field-authors" type="text" placeholder="Last, First; Last, First" class="w-full px-2 py-1.5 rounded border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-sm focus:ring-2 focus:ring-saffron-500 focus:border-saffron-500 outline-none transition-colors">
      </div>
      <div class="grid grid-cols-2 gap-2">
        <div data-field="issued">
          <label class="field-label block text-[10px] font-medium text-zinc-400 uppercase tracking-wider mb-0.5">Date <span class="req-dot hidden text-saffron-500">*</span></label>
          <div class="flex gap-1">
            <input id="field-date" type="text" placeholder="YYYY" class="flex-1 px-2 py-1.5 rounded-l border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-sm focus:ring-2 focus:ring-saffron-500 focus:border-saffron-500 outline-none transition-colors">
            <div class="flex shrink-0">
              <select id="date-precision" class="px-1 py-1.5 border border-l-0 border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-[10px] text-zinc-500 focus:ring-1 focus:ring-saffron-500 outline-none cursor-pointer" title="Date precision">
                <option value="year">Year</option>
                <option value="month">Y-M</option>
                <option value="day">Y-M-D</option>
              </select>
              <button id="btn-no-date" class="px-1.5 py-1.5 border border-l-0 border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 rounded-r text-[10px] text-zinc-400 hover:text-saffron-600 hover:bg-saffron-50 dark:hover:bg-saffron-900/20 transition-colors" title="No date (n.d.)">n.d.</button>
            </div>
          </div>
          <div id="date-hint" class="hidden mt-0.5 text-[10px]"></div>
        </div>
        <div data-field="publisher">
          <label class="field-label block text-[10px] font-medium text-zinc-400 uppercase tracking-wider mb-0.5">Publisher <span class="req-dot hidden text-saffron-500">*</span></label>
          <input id="field-publisher" type="text" class="w-full px-2 py-1.5 rounded border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-sm focus:ring-2 focus:ring-saffron-500 focus:border-saffron-500 outline-none transition-colors">
        </div>
      </div>
      <div data-field="container-title">
        <label class="field-label block text-[10px] font-medium text-zinc-400 uppercase tracking-wider mb-0.5">Container (Journal/Site) <span class="req-dot hidden text-saffron-500">*</span></label>
        <input id="field-container" type="text" class="w-full px-2 py-1.5 rounded border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-sm focus:ring-2 focus:ring-saffron-500 focus:border-saffron-500 outline-none transition-colors">
      </div>
      <div class="grid grid-cols-3 gap-2">
        <div data-field="volume">
          <label class="field-label block text-[10px] font-medium text-zinc-400 uppercase tracking-wider mb-0.5">Volume</label>
          <input id="field-volume" type="text" class="w-full px-2 py-1.5 rounded border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-sm focus:ring-2 focus:ring-saffron-500 focus:border-saffron-500 outline-none transition-colors">
        </div>
        <div data-field="issue">
          <label class="field-label block text-[10px] font-medium text-zinc-400 uppercase tracking-wider mb-0.5">Issue</label>
          <input id="field-issue" type="text" class="w-full px-2 py-1.5 rounded border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-sm focus:ring-2 focus:ring-saffron-500 focus:border-saffron-500 outline-none transition-colors">
        </div>
        <div data-field="page">
          <label class="field-label block text-[10px] font-medium text-zinc-400 uppercase tracking-wider mb-0.5">Pages</label>
          <input id="field-pages" type="text" class="w-full px-2 py-1.5 rounded border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-sm focus:ring-2 focus:ring-saffron-500 focus:border-saffron-500 outline-none transition-colors">
        </div>
      </div>
      <div data-field="DOI">
        <label class="field-label block text-[10px] font-medium text-zinc-400 uppercase tracking-wider mb-0.5">DOI / ISBN / PMID / URL <span class="req-dot hidden text-saffron-500">*</span></label>
        <div class="flex gap-1.5">
          <input id="field-doi" type="text" placeholder="10.xxxx/..., 978..., PMID:..., URL" class="flex-1 px-2 py-1.5 rounded border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-sm focus:ring-2 focus:ring-saffron-500 focus:border-saffron-500 outline-none transition-colors">
          <button id="btn-enhance" class="px-2.5 py-1.5 rounded border border-saffron-300 dark:border-saffron-700 bg-saffron-50 dark:bg-saffron-900/20 text-saffron-600 dark:text-saffron-400 hover:bg-saffron-100 dark:hover:bg-saffron-900/40 text-xs font-medium transition-colors flex items-center gap-1 shrink-0" title="Look up metadata from DOI, ISBN, PMID, or arXiv ID">
            <svg id="enhance-icon" class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <svg id="enhance-spinner" class="w-3.5 h-3.5 animate-spin hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2v4m0 12v4m-7.07-3.93l2.83-2.83m8.49-8.49l2.83-2.83M2 12h4m12 0h4M4.93 4.93l2.83 2.83m8.49 8.49l2.83 2.83"/></svg>
            Enhance
          </button>
        </div>
      </div>
      <!-- Enhance result banner -->
      <div id="enhance-result" class="hidden px-2.5 py-1.5 rounded text-xs flex items-center gap-1.5"></div>
    </div>
    </div><!-- end scrollable middle -->

    <!-- Sticky bottom: compact citation output + add -->
    <div class="shrink-0 border-t border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-900">

    <!-- Citation preview — compact: bib + in-text side by side -->
    <div class="px-4 pt-2 pb-1">
      <!-- Bibliography -->
      <div class="flex items-start justify-between gap-2 mb-1">
        <div id="citation-preview" class="flex-1 px-2 py-1.5 rounded bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 text-xs leading-relaxed max-h-[48px] overflow-y-auto select-all">
          <span class="text-zinc-400 italic">Citation preview...</span>
        </div>
        <button id="btn-copy-bib" class="shrink-0 px-2 py-1.5 rounded border border-saffron-300 dark:border-saffron-700 bg-saffron-50 dark:bg-saffron-900/20 text-saffron-600 dark:text-saffron-400 text-[10px] font-medium hover:bg-saffron-100 transition-colors">Copy Bib</button>
      </div>
      <!-- In-text -->
      <div class="flex items-center gap-2">
        <div id="intext-preview" class="flex-1 px-2 py-1 rounded bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 text-xs select-all truncate">
          <span class="text-zinc-400 italic">(Author, Year)</span>
        </div>
        <div class="flex rounded overflow-hidden border border-zinc-200 dark:border-zinc-700 shrink-0">
          <button id="btn-parenthetical" class="text-[9px] px-1.5 py-0.5 bg-saffron-500 text-white">P</button>
          <button id="btn-narrative" class="text-[9px] px-1.5 py-0.5 bg-zinc-100 dark:bg-zinc-700 text-zinc-600 dark:text-zinc-300">N</button>
        </div>
        <button id="btn-copy-intext" class="shrink-0 px-2 py-1 rounded border border-zinc-200 dark:border-zinc-700 text-[10px] text-zinc-500 hover:text-saffron-600 hover:border-saffron-400 transition-colors">Copy</button>
      </div>
    </div>

    <!-- Project + Add — single row -->
    <div class="px-4 py-1.5 space-y-1.5">
      <div class="flex gap-1.5">
        <select id="project-selector" class="flex-1 px-2 py-1.5 rounded border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-xs focus:ring-1 focus:ring-saffron-500 outline-none cursor-pointer">
          <option value="default">My Bibliography</option>
        </select>
        <button id="btn-new-project" class="px-1.5 py-1.5 rounded border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 text-zinc-500 hover:text-saffron-600 hover:border-saffron-300 transition-colors" title="New project">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <button id="btn-add-project" class="px-4 py-1.5 rounded bg-saffron-500 hover:bg-saffron-600 text-white font-medium text-xs transition-colors flex items-center gap-1 shrink-0">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          Add
        </button>
      </div>
      <!-- New project form (hidden) -->
      <div id="new-project-form" class="hidden space-y-2 p-2.5 rounded-lg border border-saffron-200 dark:border-saffron-800 bg-saffron-50/50 dark:bg-saffron-900/10">
        <input id="new-project-name" type="text" placeholder="Project name" class="w-full px-2 py-1.5 rounded border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-800 text-sm focus:ring-2 focus:ring-saffron-500 outline-none">
        <div>
          <label class="block text-[10px] font-medium text-zinc-400 mb-0.5">Project citation style</label>
          <select id="new-project-style" class="w-full px-2 py-1 rounded border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-800 text-xs focus:ring-1 focus:ring-saffron-500 outline-none cursor-pointer">
            <option value="">Use global default</option>
            <option value="apa7">APA 7th Edition</option>
            <option value="mla9">MLA 9th Edition</option>
            <option value="chicago17-author-date">Chicago 17th (Author-Date)</option>
            <option value="harvard">Harvard</option>
            <option value="ieee">IEEE</option>
            <option value="vancouver">Vancouver</option>
          </select>
        </div>
        <div class="flex gap-2">
          <button id="btn-create-project" class="flex-1 px-2 py-1.5 rounded bg-saffron-500 hover:bg-saffron-600 text-white text-xs font-medium transition-colors">Create</button>
          <button id="btn-cancel-project" class="px-2 py-1.5 rounded border border-zinc-200 dark:border-zinc-700 text-xs text-zinc-500 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">Cancel</button>
        </div>
      </div>
    </div>

    </div><!-- end sticky bottom -->
  </div>

  <!-- Error state -->
  <div id="state-error" class="hidden flex flex-col items-center justify-center py-12 gap-3 px-6 text-center">
    <svg class="w-10 h-10 text-zinc-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126z"/><path d="M12 15.75h.007v.008H12v-.008z"/></svg>
    <p id="error-message" class="text-zinc-500 dark:text-zinc-400">Unable to extract metadata from this page.</p>
    <button id="btn-retry" class="px-4 py-1.5 rounded bg-saffron-500 text-white text-sm hover:bg-saffron-600 transition-colors">Retry</button>
  </div>

  <script src="../shared/dialog.js"></script>
  <script src="popup.js" type="module"></script>
</body>
</html>
